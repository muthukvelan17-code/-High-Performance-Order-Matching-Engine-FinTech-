<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFT Trading Engine Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SockJS and Stomp for WebSockets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bid-text { color: #10b981; } /* Emerald */
        .ask-text { color: #ef4444; } /* Red */
        .bid-bg { background-color: rgba(16, 185, 129, 0.15); }
        .ask-bg { background-color: rgba(239, 68, 68, 0.15); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <!-- Header -->
    <header class="mb-6 flex justify-between items-center glass p-4 rounded-xl shadow-lg">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                Ultra-Low-Latency Engine
            </h1>
            <p class="text-slate-400 text-sm">Live Order Book Monitoring</p>
        </div>
        <div class="flex gap-4 items-center">
            <div id="ws-status" class="flex items-center gap-2 text-sm font-semibold text-rose-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span>
                </span>
                Disconnected
            </div>
            <button onclick="startSimulation()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg shadow-lg shadow-indigo-500/30 transition-all font-semibold text-sm">
                Start Bot Simulation
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
        
        <!-- Order Book Section -->
        <div class="lg:col-span-2 glass rounded-xl p-5 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold tracking-wide">BTC/USD <span class="text-slate-500 text-sm font-normal">Order Book</span></h2>
                <div class="text-xs text-slate-400 mono">Depth: 10</div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 flex-1">
                <!-- Bids -->
                <div class="flex flex-col">
                    <div class="grid grid-cols-2 text-slate-400 text-xs font-semibold mb-2 border-b border-slate-700 pb-2 uppercase tracking-wider">
                        <span>Size</span>
                        <span class="text-right">Price (USD)</span>
                    </div>
                    <div id="bids-container" class="flex-1 overflow-y-auto pr-2 space-y-1">
                        <!-- Bids will be injected here -->
                    </div>
                </div>

                <!-- Asks -->
                <div class="flex flex-col">
                    <div class="grid grid-cols-2 text-slate-400 text-xs font-semibold mb-2 border-b border-slate-700 pb-2 uppercase tracking-wider">
                        <span>Price (USD)</span>
                        <span class="text-right">Size</span>
                    </div>
                    <div id="asks-container" class="flex-1 overflow-y-auto pl-2 space-y-1">
                        <!-- Asks will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Trading Panel -->
        <div class="glass rounded-xl p-5 shadow-2xl flex flex-col gap-6">
            <div>
                <h2 class="text-xl font-bold mb-1">Place Order</h2>
                <p class="text-slate-400 text-sm">Manual REST API Injection</p>
            </div>

            <form id="order-form" class="flex flex-col gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Price</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">$</span>
                        <input type="number" id="order-price" value="60500" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg pl-8 pr-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 mono" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Quantity</label>
                    <input type="number" id="order-qty" value="10" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 mono" required>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-2">
                    <button type="button" onclick="submitOrder('BUY')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-emerald-500/30 transition-all flex justify-center items-center gap-2">
                        BUY
                    </button>
                    <button type="button" onclick="submitOrder('SELL')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-rose-500/30 transition-all flex justify-center items-center gap-2">
                        SELL
                    </button>
                </div>
            </form>

            <div class="mt-auto border-t border-slate-700 pt-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Activity Log</h3>
                <div id="activity-log" class="h-32 bg-slate-900 rounded-lg p-3 overflow-y-auto text-xs mono text-slate-400 space-y-1">
                    <div>System initialized.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SYMBOL = 'BTCUSD';
        let stompClient = null;

        // --- WebSocket Connection ---
        function connect() {
            logActivity("Attempting WebSocket connection...");
            const socket = new SockJS('http://localhost:8080/ws-trading');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // Disable excessive console logging

            stompClient.connect({}, function (frame) {
                const statusEl = document.getElementById('ws-status');
                statusEl.innerHTML = `
                    <span class="relative flex h-3 w-3">
                      <span class="absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <span class="text-emerald-400">Connected to Core</span>
                `;
                logActivity("WebSocket connected successfully.");

                // Subscribe to Market Data
                stompClient.subscribe(`/topic/market-data/${SYMBOL}`, function (message) {
                    const data = JSON.parse(message.body);
                    if(data.type === 'ORDER_BOOK_SNAPSHOT') {
                        updateOrderBook(data.payload);
                    }
                });

            }, function(error) {
                logActivity("WebSocket error. Retrying in 3s...", "error");
                setTimeout(connect, 3000);
            });
        }

        // --- Order Book Rendering ---
        function updateOrderBook(snapshot) {
            const bidsContainer = document.getElementById('bids-container');
            const asksContainer = document.getElementById('asks-container');
            
            // Render Bids (highest price first)
            let bidsHtml = '';
            if(snapshot.bids && snapshot.bids.length > 0) {
                snapshot.bids.forEach(bid => {
                    bidsHtml += `
                        <div class="grid grid-cols-2 px-2 py-1 rounded bid-bg mono text-sm relative overflow-hidden group">
                            <span class="text-white z-10 relative">${bid.quantity}</span>
                            <span class="text-right bid-text font-bold z-10 relative">${bid.price.toLocaleString()}</span>
                            <div class="absolute inset-y-0 right-0 bg-emerald-500/10 transition-all duration-300" style="width: ${Math.min(100, bid.quantity * 2)}%"></div>
                        </div>`;
                });
            } else {
                bidsHtml = `<div class="text-slate-500 text-center italic text-xs mt-4">No Bids</div>`;
            }
            bidsContainer.innerHTML = bidsHtml;

            // Render Asks (lowest price first)
            let asksHtml = '';
            if(snapshot.asks && snapshot.asks.length > 0) {
                // Asks usually arrive lowest first, we display lowest at the bottom
                const sortedAsks = [...snapshot.asks].sort((a,b) => b.price - a.price);
                sortedAsks.forEach(ask => {
                    asksHtml += `
                        <div class="grid grid-cols-2 px-2 py-1 rounded ask-bg mono text-sm relative overflow-hidden group">
                            <span class="ask-text font-bold z-10 relative">${ask.price.toLocaleString()}</span>
                            <span class="text-right text-white z-10 relative">${ask.quantity}</span>
                            <div class="absolute inset-y-0 left-0 bg-rose-500/10 transition-all duration-300" style="width: ${Math.min(100, ask.quantity * 2)}%"></div>
                        </div>`;
                });
            } else {
                asksHtml = `<div class="text-slate-500 text-center italic text-xs mt-4">No Asks</div>`;
            }
            asksContainer.innerHTML = asksHtml;
        }

        // --- REST API Interactions ---
        async function submitOrder(side) {
            const price = document.getElementById('order-price').value;
            const quantity = document.getElementById('order-qty').value;
            
            const payload = {
                symbol: SYMBOL,
                price: parseInt(price),
                quantity: parseInt(quantity),
                side: side,
                type: 'LIMIT',
                userId: Math.floor(Math.random() * 1000)
            };

            logActivity(`Sending ${side} order: ${quantity} @ ${price}`);

            try {
                const response = await fetch('http://localhost:8080/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.text();
                logActivity(`Success: ${result}`);
                pollOrderBook(); // Force refresh just in case WS is slow
            } catch (err) {
                logActivity(`Error submitting order: ${err.message}`, "error");
            }
        }

        async function startSimulation() {
            logActivity("Triggering Market Maker Bot...");
            try {
                const response = await fetch('http://localhost:8080/api/test/bot');
                const result = await response.text();
                logActivity(result);
            } catch(err) {
                logActivity("Failed to start bot.", "error");
            }
        }

        async function pollOrderBook() {
            try {
                const response = await fetch(`http://localhost:8080/api/market-data/${SYMBOL}/book`);
                if(response.ok) {
                    const snapshot = await response.json();
                    updateOrderBook(snapshot);
                }
            } catch(err) {}
        }

        // --- Utilities ---
        function logActivity(msg, type="info") {
            const logEl = document.getElementById('activity-log');
            const time = new Date().toLocaleTimeString();
            const color = type === "error" ? "text-rose-400" : "text-slate-400";
            logEl.innerHTML = `<div class="${color}">[${time}] ${msg}</div>` + logEl.innerHTML;
        }

        // Initialize
        connect();
        // Initial fetch before WS kicks in
        pollOrderBook();
        // Fallback polling just in case WS isn't implemented completely yet
        setInterval(pollOrderBook, 1000); 

    </script>
</body>
</html>
