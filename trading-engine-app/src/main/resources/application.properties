# Spring Boot Configuration
server.port=8080

# Expose Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.trading.engine=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Trading Engine specific configs
trading.engine.symbol-config=BTCUSD,ETHUSD,SOLUSD

server.port=8081

# H2 Database and JPA Configuration
spring.datasource.url=jdbc:h2:file:./data/tradingdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
